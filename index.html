<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>삼육대 졸특 ONE_PASS 라운지</title>

<style>
:root {
  --bg:#eef4f6;
  --text:#203243;
  --muted:#7a8a97;

  --green:#19b15a;
  --purple:#8d63d8;
  --blue:#3c86f4;

  --shadow:0 8px 20px rgba(28,56,80,.06);
}

*{box-sizing:border-box;}
body{
  margin:0;
  font-family:"맑은 고딕";
  background:var(--bg);
}

.page{
  max-width:430px;
  margin:0 auto;
}

.hero img{
  width:100%;
  border-radius:0 0 24px 24px;
}

/* 공통 카드 */
.section{padding:10px;}
.block{
  background:#fff;
  border-radius:18px;
  box-shadow:var(--shadow);
  overflow:hidden;
}

.block-header{
  display:flex;
  gap:10px;
  padding:14px;
  border-bottom:1px solid #eee;
}

.header-icon{
  width:32px;height:32px;
  border-radius:50%;
  display:grid;place-items:center;
  color:#fff;font-weight:bold;
}

.theme-green .header-icon{background:var(--green);}
.theme-purple .header-icon{background:var(--purple);}
.theme-blue .header-icon{background:var(--blue);}

.header-title{
  margin:0;
  font-size:18px;
  font-weight:900;
}

.header-sub{
  font-size:11px;
  color:var(--muted);
}

/* 프로그램 카드 */
.program-list{padding:10px;display:grid;gap:10px;}

.program-item{
  display:grid;
  grid-template-columns:44px 1fr;
  gap:12px;
  padding:12px;
  border:1px solid #eee;
  border-radius:14px;
}

.item-icon{
  width:44px;height:44px;
  border-radius:50%;
  display:grid;place-items:center;
  color:#fff;
}

.theme-green .item-icon{background:var(--green);}
.theme-purple .item-icon{background:var(--purple);}

.item-body{display:flex;flex-direction:column;}

.item-title{
  font-size:18px;
  font-weight:900;
  margin:0 0 4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.item-desc{
  font-size:12px;
  color:#666;
  margin-bottom:8px;
}

.item-meta{font-size:12px;}

.item-action{margin-top:10px;}

.btn{
  display:inline-block;
  padding:10px 14px;
  border-radius:10px;
  color:#fff;
  font-size:13px;
  font-weight:900;
}

.btn.green{background:var(--green);}
.btn.purple{background:var(--purple);}
.btn.blue{background:var(--blue);}

/* 프로젝트 */
.project-card{padding:14px;}
.project-title{font-size:20px;font-weight:900;}
.project-bottom{margin-top:10px;display:flex;justify-content:space-between;}

/* 상담 */
.consulting-wrap{padding:10px;}
.consulting-card{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.consulting-btn{
  padding:14px;
  text-align:center;
  border-radius:12px;
  color:#fff;
  font-weight:900;
}

.consulting-btn.green{background:var(--green);}
.consulting-btn.purple{background:var(--purple);}
.consulting-btn.blue{background:var(--blue);}

</style>
</head>

<body>
<div class="page">

<!-- 배너 -->
<section class="hero">

<!-- 서울고용센터 -->

</div>
</div>

</body>
</html>
